AWSTemplateFormatVersion: '2010-09-09'
Description: CostNova staging infrastructure - EC2, RDS PostgreSQL, S3

Parameters:
  Environment:
    Type: String
    Default: staging
    AllowedValues: [staging, production]
  InstanceType:
    Type: String
    Default: t3.medium
  DBInstanceClass:
    Type: String
    Default: db.t3.medium
  DBAllocatedStorage:
    Type: Number
    Default: 100
  DBName:
    Type: String
    Default: costnova
  DBUsername:
    Type: String
    Default: admin
    NoEcho: true
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8

Resources:
  WebInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: !Ref InstanceType
      Tags:
        - Key: Name
          Value: costnova-web
        - Key: Environment
          Value: !Ref Environment
        - Key: Client
          Value: costnova

  MainDB:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: !Ref DBAllocatedStorage
      Engine: postgres
      EngineVersion: '15.3'
      DBInstanceClass: !Ref DBInstanceClass
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      MultiAZ: false
      Tags:
        - Key: Name
          Value: costnova-db
        - Key: Environment
          Value: !Ref Environment
        - Key: Client
          Value: costnova

  StorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub costnova-storage-${Environment}
      Tags:
        - Key: Name
          Value: costnova-storage
        - Key: Environment
          Value: !Ref Environment
        - Key: Client
          Value: costnova

Outputs:
  InstanceId:
    Value: !Ref WebInstance
  DBEndpoint:
    Value: !GetAtt MainDB.Endpoint.Address
  BucketName:
    Value: !Ref StorageBucket
