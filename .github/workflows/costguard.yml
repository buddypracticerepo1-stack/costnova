name: CostGuard Cost Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  costguard:
    name: Validate Infrastructure Costs - costnova
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CostGuard CLI
        run: pip install costguard-cli

      - name: Run CostGuard Validation
        env:
          COSTGUARD_API_URL: ${{ secrets.COSTGUARD_API_URL }}
          COSTGUARD_API_KEY: ${{ secrets.COSTGUARD_API_KEY }}
        run: |
          costguard-validate \
            --plan terraform/plan.json \
            --format terminal \
            --post-comment
