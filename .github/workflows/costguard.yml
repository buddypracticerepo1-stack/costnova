name: CostGuard Cost Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  costguard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: CostGuard Validation
        env:
          COSTGUARD_API_KEY: ${{ secrets.COSTGUARD_API_KEY }}
          COSTGUARD_API_URL: ${{ secrets.COSTGUARD_API_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install -q costguard-cli
          costguard-validate \
            --plan terraform/plan.json \
            --budget-code CS-FY2026-BU105-M03 \
            --format terminal \
            --post-comment \
            --cache-path costguard-result.json
          costguard-validate \
            --cached costguard-result.json \
            --format html \
            --output-file costguard-report.html

      - name: Upload Cost Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: costguard-report
          path: costguard-report.html
          retention-days: 30
