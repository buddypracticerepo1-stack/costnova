name: CloudFormation Change Set Preview

on:
  push:
    branches: [main]
    paths:
      - 'cloudformation/**'
  pull_request:
    branches: [main]
    paths:
      - 'cloudformation/**'
  workflow_dispatch:

env:
  STACK_NAME: costnova-staging
  AWS_REGION: us-east-1
  TEMPLATE_FILE: cloudformation/costnova-stack.json

jobs:
  validate-and-changeset:
    name: Validate & Create Change Set
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          echo "=== Validating Template ==="
          aws cloudformation validate-template \
            --template-body file://${{ env.TEMPLATE_FILE }}
          echo "Template is valid."

      - name: Determine change set type
        id: check-stack
        run: |
          if aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} > /dev/null 2>&1; then
            echo "type=UPDATE" >> $GITHUB_OUTPUT
            echo "Stack exists — will create UPDATE change set"
          else
            echo "type=CREATE" >> $GITHUB_OUTPUT
            echo "Stack does not exist — will create CREATE change set"
          fi

      - name: Create change set
        id: changeset
        run: |
          CHANGESET_NAME="changeset-${{ github.run_id }}-${{ github.run_number }}"
          echo "name=$CHANGESET_NAME" >> $GITHUB_OUTPUT

          echo "=== Creating Change Set: $CHANGESET_NAME ==="
          aws cloudformation create-change-set \
            --stack-name ${{ env.STACK_NAME }} \
            --change-set-name "$CHANGESET_NAME" \
            --template-body file://${{ env.TEMPLATE_FILE }} \
            --change-set-type ${{ steps.check-stack.outputs.type }} \
            --parameters \
              ParameterKey=Environment,ParameterValue=staging \
              ParameterKey=InstanceType,ParameterValue=t3.medium \
              ParameterKey=DBInstanceClass,ParameterValue=db.t3.medium \
              ParameterKey=DBAllocatedStorage,ParameterValue=100 \
              ParameterKey=DBName,ParameterValue=costnova \
              ParameterKey=DBUsername,ParameterValue=admin \
              ParameterKey=DBPassword,ParameterValue=${{ secrets.DB_PASSWORD }} \
            --tags \
              Key=Client,Value=costnova \
              Key=Environment,Value=staging

      - name: Wait for change set
        run: |
          echo "Waiting for change set to be ready..."
          aws cloudformation wait change-set-create-complete \
            --stack-name ${{ env.STACK_NAME }} \
            --change-set-name ${{ steps.changeset.outputs.name }}
          echo "Change set is ready."

      - name: Preview change set
        run: |
          echo "=== Change Set Preview ==="
          aws cloudformation describe-change-set \
            --stack-name ${{ env.STACK_NAME }} \
            --change-set-name ${{ steps.changeset.outputs.name }} \
            --query '{Status:Status,StatusReason:StatusReason,Changes:Changes[].{Action:ResourceChange.Action,LogicalId:ResourceChange.LogicalResourceId,ResourceType:ResourceChange.ResourceType,Replacement:ResourceChange.Replacement,PhysicalId:ResourceChange.PhysicalResourceId}}' \
            --output table

          echo ""
          echo "=== Full JSON Output ==="
          aws cloudformation describe-change-set \
            --stack-name ${{ env.STACK_NAME }} \
            --change-set-name ${{ steps.changeset.outputs.name }} \
            --output json

      - name: Post summary to PR
        if: github.event_name == 'pull_request'
        run: |
          CHANGES=$(aws cloudformation describe-change-set \
            --stack-name ${{ env.STACK_NAME }} \
            --change-set-name ${{ steps.changeset.outputs.name }} \
            --query 'Changes[].{Action:ResourceChange.Action,Resource:ResourceChange.LogicalResourceId,Type:ResourceChange.ResourceType,Replacement:ResourceChange.Replacement}' \
            --output table)

          echo "## CloudFormation Change Set Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Stack:** \`${{ env.STACK_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** \`${{ steps.check-stack.outputs.type }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$CHANGES" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Cleanup change set
        if: always()
        run: |
          aws cloudformation delete-change-set \
            --stack-name ${{ env.STACK_NAME }} \
            --change-set-name ${{ steps.changeset.outputs.name }} 2>/dev/null || true
          echo "Change set cleaned up."
